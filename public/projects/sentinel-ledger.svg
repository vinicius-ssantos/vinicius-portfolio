<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Sentinel Ledger architecture cover</title>
  <desc id="desc">A dark technical diagram connecting payments, idempotency, ledger, reconciliation, outbox and audit modules.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#09090b"/>
      <stop offset="0.52" stop-color="#111827"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#18181b" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#0f172a" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#34d399"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M 64 0 L 0 0 0 64" fill="none" stroke="#334155" stroke-opacity="0.18" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1600" height="1000" fill="url(#bg)"/>
  <rect width="1600" height="1000" fill="url(#grid)"/>
  <circle cx="1260" cy="160" r="280" fill="#10b981" opacity="0.06"/>
  <circle cx="260" cy="870" r="330" fill="#0891b2" opacity="0.05"/>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace">
    <text x="110" y="125" fill="#6ee7b7" font-size="28" letter-spacing="8">FINANCIAL TRUTH / RECOVERY / AUDIT</text>
    <text x="104" y="222" fill="#f8fafc" font-size="86" font-weight="700" letter-spacing="-3">SENTINEL LEDGER</text>
    <text x="110" y="278" fill="#94a3b8" font-size="27" letter-spacing="2">MODULAR PAYMENT ORCHESTRATION LAB</text>

    <g fill="none" stroke="#34d399" stroke-opacity="0.5" stroke-width="3">
      <path d="M330 470 C470 470 470 420 610 420"/>
      <path d="M330 610 C470 610 470 660 610 660"/>
      <path d="M930 420 C1070 420 1070 470 1210 470"/>
      <path d="M930 660 C1070 660 1070 610 1210 610"/>
      <path d="M770 500 L770 580"/>
    </g>

    <g fill="#34d399" filter="url(#glow)">
      <circle cx="470" cy="446" r="7"/>
      <circle cx="1080" cy="446" r="7"/>
      <circle cx="770" cy="540" r="7"/>
    </g>

    <g>
      <rect x="110" y="390" width="220" height="160" rx="22" fill="url(#panel)" stroke="#334155" stroke-width="2"/>
      <text x="145" y="445" fill="#64748b" font-size="20" letter-spacing="3">01</text>
      <text x="145" y="500" fill="#f8fafc" font-size="29" font-weight="700">PAYMENTS</text>
      <text x="145" y="530" fill="#94a3b8" font-size="17">INTENT / AUTH / CAPTURE</text>

      <rect x="110" y="570" width="220" height="160" rx="22" fill="url(#panel)" stroke="#334155" stroke-width="2"/>
      <text x="145" y="625" fill="#64748b" font-size="20" letter-spacing="3">02</text>
      <text x="145" y="680" fill="#f8fafc" font-size="27" font-weight="700">IDEMPOTENCY</text>
      <text x="145" y="710" fill="#94a3b8" font-size="17">FINGERPRINT / REPLAY</text>

      <rect x="610" y="350" width="320" height="150" rx="24" fill="url(#panel)" stroke="#34d399" stroke-opacity="0.65" stroke-width="3"/>
      <text x="650" y="405" fill="#6ee7b7" font-size="20" letter-spacing="3">DOUBLE ENTRY</text>
      <text x="650" y="463" fill="#f8fafc" font-size="42" font-weight="700">LEDGER</text>

      <rect x="610" y="580" width="320" height="150" rx="24" fill="url(#panel)" stroke="#22d3ee" stroke-opacity="0.6" stroke-width="3"/>
      <text x="650" y="635" fill="#67e8f9" font-size="20" letter-spacing="3">EVIDENCE BASED</text>
      <text x="650" y="693" fill="#f8fafc" font-size="34" font-weight="700">RECONCILIATION</text>

      <rect x="1210" y="390" width="250" height="160" rx="22" fill="url(#panel)" stroke="#334155" stroke-width="2"/>
      <text x="1245" y="445" fill="#64748b" font-size="20" letter-spacing="3">05</text>
      <text x="1245" y="500" fill="#f8fafc" font-size="31" font-weight="700">OUTBOX</text>
      <text x="1245" y="530" fill="#94a3b8" font-size="17">RETRY / DLQ / WEBHOOK</text>

      <rect x="1210" y="570" width="250" height="160" rx="22" fill="url(#panel)" stroke="#334155" stroke-width="2"/>
      <text x="1245" y="625" fill="#64748b" font-size="20" letter-spacing="3">06</text>
      <text x="1245" y="680" fill="#f8fafc" font-size="31" font-weight="700">AUDIT</text>
      <text x="1245" y="710" fill="#94a3b8" font-size="17">APPEND ONLY EVIDENCE</text>
    </g>

    <g transform="translate(110 840)">
      <rect width="1380" height="72" rx="18" fill="#020617" fill-opacity="0.75" stroke="#1e293b"/>
      <rect x="24" y="22" width="210" height="28" rx="14" fill="url(#accent)" opacity="0.16"/>
      <circle cx="48" cy="36" r="8" fill="#34d399"/>
      <text x="70" y="43" fill="#a7f3d0" font-size="19">BALANCED</text>
      <text x="305" y="43" fill="#94a3b8" font-size="19">POSTGRESQL SOURCE OF TRUTH</text>
      <text x="765" y="43" fill="#94a3b8" font-size="19">SIMULATED PSP</text>
      <text x="1085" y="43" fill="#94a3b8" font-size="19">NO REAL PAYMENTS</text>
    </g>
  </g>
</svg>
