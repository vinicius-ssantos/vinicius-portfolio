version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      # react-dom hard-fails at runtime unless react is the exact same
      # version ("Incompatible React versions" in react-dom-client), so
      # separate bump PRs for the pair can never both pass CI — one of them
      # always carries the mismatch. Seen on PRs #85/#86 bumping
      # 19.2.7 -> 19.2.8 one package at a time.
      react:
        patterns:
          - "react"
          - "react-dom"
      dev-dependencies:
        dependency-type: "development"
    ignore:
      # typescript-eslint (bundled transitively via eslint-config-next) only
      # supports typescript <6.1.0 today — a major-version bump past that
      # breaks `npm ci` outright (ERESOLVE) until the toolchain catches up.
      # Re-evaluate by checking `npm ls typescript` peer constraints once
      # eslint-config-next/typescript-eslint publish TS 7 support.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      # eslint-plugin-react (bundled transitively via eslint-config-next)
      # calls an ESLint 9-era rule-context API removed in ESLint 10
      # (`context.getFilename` on the rule context), which throws at lint
      # time — confirmed by actually running `npm run lint` against a real
      # ESLint 10 install, not just the peer-range warning. Re-evaluate by
      # running `npm run lint` against a fresh ESLint 10 install once
      # eslint-config-next publishes ESLint 10 support.
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
