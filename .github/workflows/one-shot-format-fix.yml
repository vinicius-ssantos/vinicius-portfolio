name: One-shot Prettier format fix

on:
  push:
    branches:
      - feat/issue-98-sentinel-ledger

permissions:
  contents: write

jobs:
  format:
    name: Apply exact Prettier output
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Activate the pinned npm
        uses: ./.github/actions/pinned-npm

      - name: Install dependencies
        run: npm ci

      - name: Format affected files
        run: npx prettier --write e2e/accessibility.spec.ts e2e/project-pages.spec.ts

      - name: Remove one-shot workflow
        run: rm .github/workflows/one-shot-format-fix.yml

      - name: Commit exact formatter output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add e2e/accessibility.spec.ts e2e/project-pages.spec.ts .github/workflows/one-shot-format-fix.yml
          if git diff --cached --quiet; then
            echo "No formatting changes required"
            exit 0
          fi
          git commit -m "style(e2e): apply exact Prettier formatting"
          git push origin HEAD:${{ github.ref_name }}
