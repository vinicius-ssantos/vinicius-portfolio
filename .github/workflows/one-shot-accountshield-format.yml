name: One-shot AccountShield format

on:
  push:
    branches:
      - feat/issue-99-accountshield-orchestrator

permissions:
  contents: write

jobs:
  format:
    name: Apply exact Prettier output
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Activate the pinned npm
        uses: ./.github/actions/pinned-npm

      - name: Install dependencies
        run: npm ci

      - name: Format AccountShield publication files
        run: |
          npx prettier --write \
            src/content/projects/accountshield-orchestrator.ts \
            src/content/projects/index.ts \
            src/content/__tests__/content.test.ts \
            e2e/project-pages.spec.ts \
            e2e/navigation.spec.ts \
            e2e/accessibility.spec.ts \
            public/projects/accountshield-orchestrator.svg

      - name: Remove one-shot workflow
        run: rm .github/workflows/one-shot-accountshield-format.yml

      - name: Commit exact formatter output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            src/content/projects/accountshield-orchestrator.ts \
            src/content/projects/index.ts \
            src/content/__tests__/content.test.ts \
            e2e/project-pages.spec.ts \
            e2e/navigation.spec.ts \
            e2e/accessibility.spec.ts \
            public/projects/accountshield-orchestrator.svg \
            .github/workflows/one-shot-accountshield-format.yml
          git commit -m "style: apply exact AccountShield formatting"
          git push origin HEAD:${{ github.ref_name }}
