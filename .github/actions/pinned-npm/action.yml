name: Activate the pinned npm
description: >
  Makes `npm` resolve to the version pinned in package.json's packageManager
  field, and fails the job if it doesn't.

# Why this exists, and why it verifies instead of just enabling:
#
# package.json pins `packageManager: npm@<version>`, but runners resolve
# setup-node's bundled npm — jobs silently ran a different major than local
# development, and the two resolve optional platform dependencies
# (@emnapi/*, @swc/helpers) differently, so a lockfile written by one was
# rejected by `npm ci` under the other. That mismatch silently broke every
# Dependabot PR for a while, and the first attempt at fixing it (a bare
# `corepack enable`) looked correct while changing nothing.
#
# The activation is a plain global install rather than corepack: corepack is
# deprecated in Node 24 and removed from Node 25+, so building the pin on it
# would quietly stop working on the next Node bump — the exact failure mode
# this action exists to prevent. The assert at the end means a pin that
# stops being honoured breaks the build loudly instead of going quiet again.
runs:
  using: composite
  steps:
    - name: Activate and verify
      shell: bash
      run: |
        set -euo pipefail
        pinned="$(node -p "require('./package.json').packageManager ?? ''")"
        if [ -z "$pinned" ]; then
          echo "::error::package.json has no packageManager field to honour"
          exit 1
        fi

        expected="${pinned#npm@}"
        if [ "$(npm --version)" != "$expected" ]; then
          npm install -g "$pinned"
        fi

        actual="$(npm --version)"
        echo "pinned=$expected active=$actual"

        if [ "$expected" != "$actual" ]; then
          echo "::error::npm $actual is active but package.json pins $expected"
          exit 1
        fi
